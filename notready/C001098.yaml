# US Senator Ted Cruz
bioguide: C001098
contact_form:
  method: post
  driver: chrome
  steps:
    - visit: "https://www.cruz.senate.gov/contact/write-ted/form"
    - wait:
        - value: 3
    - fill_in:
        - name: First name
          selector: "#input-B03E05C4-4040-F985-52CD-9CA44623DE5E"
          value: $NAME_FIRST
          required: true
        - name: Last name
          selector: "#input-B03E04BD-4040-F985-52CD-48E090E769DA"
          value: $NAME_LAST
          required: true
        - name: Street
          selector: "#input-B03E05F1-4040-F985-52CD-A580E72A7D41"
          value: $ADDRESS_STREET
          required: true
        - name: Street2
          selector: "#input-B03E0518-4040-F985-52CD-CF33EF97DA3A"
          value: $ADDRESS_STREET_2
          required: false
        - name: City
          selector: "#input-B03E0595-4040-F985-52CD-C572364023FE"
          value: $ADDRESS_CITY
          required: true
        - name: zip
          selector: "#input-B03E04CC-4040-F985-52CD-4DDB58DA474A"
          value: $ADDRESS_ZIP5
          required: true
        - name: phone
          selector: "#input-B03E046E-4040-F985-52CD-A2F10450D58D"
          value: $PHONE
          required: true
        - name: email
          selector: "#email"
          value: $EMAIL
          required: true
        - name: Subject
          selector: "#input-91FE927D-5056-A066-600E-4988E56F75CA"
          value: $SUBJECT
          required: true
        - name: Message
          selector: "#input-B03E05B4-4040-F985-52CD-8DF0BC10EEE2"
          value: $MESSAGE
          required: true
    - javascript:
        - name: Message
          selectors: ["#input-B03E05B4-4040-F985-52CD-8DF0BC10EEE2"]
          values: ["$MESSAGE"]
          commands:
            [
              "for(var i = 0; i < elements.length; i++) { elements[i].value = values[i].replace(/\\b(set forth in the bill)\\b/ig,'').replace(/(%2[0C])/g, '').replace(/(;)/g,'').replace(/(—)/g,'').replace(/(%2d)/g,'');}",
            ]
          required: true
    - select:
        - name: prefix
          selector: "#input-B03E0527-4040-F985-52CD-C0DD6BEF325F"
          value: $NAME_PREFIX
          required: true
          options: 
            Mr.: Mr. 
            Mrs.: Mrs
            Ms.: Ms.
            Miss: Miss
            Mx.: Mx
            Mr. and Mrs.: Mr. and Mrs. 
            Mr. and Mr.: Mr. and Mr. 
            Mrs. and Mrs: Mrs. and Mrs. 
            Dean: Dean
            Dr.: Dr. 
            Dr. and Dr.: Dr. and Dr. 
            Dr. and Mrs.: Dr. and Mrs. 
            Professor: Professor
            The Honorable: The Honorable
        - name: Topic
          selector: "#input-B03E04DB-4040-F985-52CD-18F332336F99"
          value: $TOPIC
          required: true
          options:
            No Response Necessary: Write Ted - No Response Required
            Agriculture: Agriculture
            Animal Welfare: Animal Welfare
            Banking/Housing: Banking/Housing
            Border/Immigration: Border/Immigration
            Budget/Appropriations: Budget/Appropriations
            Campaigns/Elections: Campaigns/Elections
            Commerce/Telecommunications: Commerce/Telecommunications
            Commerce/Trade: Commerce/Trade
            Constitutional/Civil Rights: Constitutional/Civil Rights
            Crime: Crime
            Defense/Military: Defense/Military
            Economy/Jobs: Economy/Jobs
            Education: Education
            Energy: Energy
            Environment: Environment
            Foreign Policy: Foreign Policy
            Government Reform/Regulations: Government Reform/Regulations
            Health Care: Health Care
            Indian Affairs: Indian Affairs
            Judiciary: Judiciary
            Labor: Labor
            NASA: NASA
            Science/Technology: Science/Technology
            Second Amendment: Second Amendment
            Social Issues: Social Issues
            Social Security: Social Security
            Taxes: Taxes
            Transportation: Transportation
            Veterans Affairs: Veterans Affairs
            Welfare: Welfare
        - name: state
          selector: "#input-B03E0669-4040-F985-52CD-11B231195172"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
          options: 
            TX: TX
    - wait: 
        - value: 4
    - javascript: 
        - selector: ["input-6AF62838-5056-A066-60CC-D012F4F72835"] 
          commands: 
            - "var el = document.querySelector('#input-6AF62838-5056-A066-60CC-D012F4F72835');"
            - "if(el){"
            - "  el.scrollIntoView({block:'center'});"
            - "  el.value = 'Response Requested';"
            - "  el.dispatchEvent(new Event('change', { bubbles: true }));"
            - "}"
          required: true
    - wait: 
        - value: 2
    - click_on:
        - value: Submit
          selector: "button.btn"
    - wait:
        - value: 2
    - javascript:
        - selector: ["body"]
          commands:
            - "var img = document.querySelector(\"img[src*='thankyou_tedsignature.png']\");"
            - "if(img && !document.getElementById('automation_success_marker')){"
            - "  var m = document.createElement('div');"
            - "  m.id = 'automation_success_marker';"
            - "  m.innerText = 'FORM_SUBMIT_SUCCESS';"
            - "  m.style.position = 'fixed';"
            - "  m.style.bottom = '0';"
            - "  m.style.right = '0';"
            - "  m.style.zIndex = '2147483647';"
            - "  m.style.fontSize = '10px';"
            - "  m.style.lineHeight = '10px';"
            - "  m.style.padding = '1px 2px';"
            - "  m.style.background = 'transparent';"
            - "  m.style.color = '#000';"
            - "  document.body.appendChild(m);"
            - "}"
          required: true
    - wait: 
        - value: 4
  success:
    headers:
      status: 200
    body:
      contains: "FORM_SUBMIT_SUCCESS" 

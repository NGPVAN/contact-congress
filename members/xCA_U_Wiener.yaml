bioguide: xCA_U_Wiener
contact_form:
  driver: chrome
  steps:
    - visit: "https://sd11.senate.ca.gov/contact"
    - iframe: 
        - selector: "iframe.contact-form"
          back: false
    - fill_in:
        - name: First Name
          selector: "#form_name"
          value: $NAME_FIRST
          required: true
        - name: Last Name
          selector: "#form_lastname"
          value: $NAME_LAST
          required: true
        - name: Address
          selector: "#form_address"
          value: $ADDRESS_STREET
          required: true
        - name: City
          selector: "#form_city"
          value: $ADDRESS_CITY
          required: true
        - name: Zip
          selector: "#form_zip"
          value: $ADDRESS_ZIP5
          required: true
        - name: Phone
          selector: "#txtPhNumber"
          value: $PHONE
          required: false
        - name: Email
          selector: "#form_email"
          value: $EMAIL
          required: true
        - name: Message
          selector: "#comments"
          value: $MESSAGE
          options:
            max_length: 2000
          required: true
    - wait: 
        - value: 3
    - javascript:
      - selector: ["#submitButton"]
        commands: ["var r=arguments[0][0].getBoundingClientRect(); var cx=r.left+r.width/2, cy=r.top+r.height/2; var e=document.elementFromPoint(cx,cy); console.log('OVERLAY at button center ('+cx+','+cy+'):', e && e.outerHTML.substring(0,300));"]
    - wait: 
        - value: 3
    - javascript:
      - selector: ["#submitButton"]
        commands: ["document.querySelector('#submitButton').scrollIntoView({block:'center'}); document.querySelector('#submitButton').click();"]
    - wait: 
        - value: 3
  success:
    body:
      excludes: "Select an Issue"
      contains: "Thank you for contacting"

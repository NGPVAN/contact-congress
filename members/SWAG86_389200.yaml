# WA Governor Bob Ferguson
bioguide: SWAG86_389200
contact_form:
  usePhantomJSLogging: true
  steps:
    - visit: "https://governor.wa.gov/contacting-governor/contacting-governors-office/send-gov-ferguson-e-message"
    - iframe: 
        - selector: "iframe.contact-form"
          back: false
    - fill_in:
        - name: prefix
          selector: "#qi_1_prefix"
          value: $NAME_PREFIX
          required: false
        - name: First Name
          selector: "#qi_1_first_name"
          value: $NAME_FIRST
          required: true
        - name: Last Name
          selector: "#qi_1_last_name"
          value: $NAME_LAST
          required: true
        - name: Email
          selector: "#qi_1_email"
          value: $EMAIL
          required: true
        - name: Phone
          selector: "#qi_1_hphone"
          value: $PHONE
          required: true
        - name: Address
          selector: "#qi_1_addr_1"
          value: $ADDRESS_STREET
          required: true
        - name: City
          selector: "#qi_1_city"
          value: $ADDRESS_CITY
          required: true
        - name: Zip
          selector: "#qi_1_zip"
          value: $ADDRESS_ZIP5
          required: true
        - name: Message
          selector: "#qi_6"
          value: $MESSAGE
          options:
            max_length: 2000
          required: true
    - select: 
        - name: Topic
          selector: "#qi_4"
          value: $TOPIC
          required: true
          options:
              0_Agriculture: Agriculture
              1_Animal: Animal
              2_Budget: Budget
              3_Commerce/Business/Economic Development: Commerce/Business/Economic Development
              4_Education/Schools: Education/Schools
              5_Emergency Preparedness: Emergency Preparedness
              6_Energy: Energy
              7_Environment: Environment
              8_Federal Government: Federal Government
              9_Gun Control: Gun Control
              10_Health Care: Health Care
              11_Housing: Housing
              12_Immigration: Immigration
              13_Issue with a State Agency: Issue with a State Agency
              14_Legal/Crime/Law Enforcement: Legal/Crime/Law Enforcement
              15_Legislative Bills and Comments: Legislative Bills and Comments
              16_Licensing: Licensing
              17_Mortgage/Loans/Banking/Foreclosure: Mortgage/Loans/Banking/Foreclosure
              18_Natural Resources: Natural Resources
              19_Parks and Recreation: Parks and Recreation
              20_Social Services: Social Services
              21_Taxes: Taxes
              22_Transportation: Transportation
              23_Tribal: Tribal
              24_Utilities: Utilities
              25_Veterans: Veterans
    - wait: 
        - value: 3
    - javascript: 
        - selector: ["#btn_submit"] 
          commands: ["document.querySelector('#btn_submit').scrollIntoView({block:'center'});"]
          required: true
    - click_on:
        - value: Submit
          selector: "#btn_submit"
  success:
    body:
      contains: "Thank you"
